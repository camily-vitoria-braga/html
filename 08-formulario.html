<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário em HTML 5</title>
</head>
<body>
 <h1>Formulário em HTML</h1> 
 
 <h2>Cadastro de Novo Usuário</h2>
 <form action="">
    <label for="Nome">Nome completo</label><br>
    <input 
    type="text" 
    name="nome" 
    id="nome"
     placeholder="Digite seu nome"
     >
    <br><br>
     <label for="Email"> Email</label><br>
     <input 
     type="email"
      name="" id="" 
      placeholder="Digite seu Email" > 
      <br><br>
       <label for="Senha">Senha:</label><br>
    <input 
    type="password"
     name="Senha" 
     id="Senha"
    placeholder="Digite sua senha"
    >
<br><br>
<label for="data de nascimento">data de nascimento:</label><br>
<input 
type="date" 
name="data-nascimento" 
id="data-nascimento"
>
<br><br>
<label for="genero">gêñero:</label><br>
<input type="radio" name="genero" id="feminino" value="masculino">
<label for="masculino">masculino</label>

<input type="radio" name="genero" id="feminino" value="feminino">
<label for="feminino">feminino</label>
<br><br>
<label for="setor">Setor:</label><br>
<select name="setor" id="setor">
    <option value="vendas">vendas</option>
    <option value="marketing">marketing</option>
    <option value="ti">ti</option>
</select>
<br> <br>
<label for="hobby">Hobby(escolha uma ou mais opções):</label>
<input type="checkbox" name="leitura" id="leitura">
<label for="leitura">leitura</label>
<input type="checkbox" name="musica" id="musica">
<label for="musica">masica</label>
<input type="checkbox" name="esporte" id="esporte">
<label for="esporte">esporte</label>
<br><br>
<button type="submit">cadastrar</button>
<button type="reset">limpar</button>
      </form>
</body>
</html>
